name: Deploy to GitHub Pages

# Publishes the static site in /docs to GitHub Pages.
# Requires: Settings → Pages → Source = "GitHub Actions" (one-time).

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch: {}

# Least-privilege token: read the repo, write Pages, mint the deploy OIDC token.
permissions:
  contents: read
  pages: write
  id-token: write

# Let a newer run supersede an in-progress one, but never cancel a live deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
